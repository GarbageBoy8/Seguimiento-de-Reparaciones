version: '3.8'

services:
  # 1. El Servidor Web Principal (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixbound-app
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql

  # 2. El Trabajador de Colas (Para correos y tareas asíncronas)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixbound-worker
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    restart: unless-stopped
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql

  # 3. El Cron Job (Para evaluar los niveles de servicio y retardos)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixbound-scheduler
    command: php artisan schedule:work
    restart: unless-stopped
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql

  # 4. La Base de Datos MySQL
  mysql:
    image: mysql:8.0
    container_name: fixbound-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M

volumes:
  mysql_data:
